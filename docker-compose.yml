services:
  postgres:
    image: postgres:16-alpine
    container_name: swing-radar-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${SWING_RADAR_POSTGRES_DB:-swing_radar}
      POSTGRES_USER: ${SWING_RADAR_POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${SWING_RADAR_POSTGRES_PASSWORD:-postgres}
    ports:
      - "${SWING_RADAR_POSTGRES_PORT:-15432}:5432"
    volumes:
      - swing-radar-postgres:/var/lib/postgresql/data
      - ./db/postgres-schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SWING_RADAR_POSTGRES_USER:-postgres} -d ${SWING_RADAR_POSTGRES_DB:-swing_radar}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: swing-radar-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      SWING_RADAR_API_ORIGIN: ${SWING_RADAR_API_ORIGIN:-http://localhost:3000}
      SWING_RADAR_DATA_PROVIDER: ${SWING_RADAR_DATA_PROVIDER:-postgres}
      SWING_RADAR_FALLBACK_PROVIDER: ${SWING_RADAR_FALLBACK_PROVIDER:-file}
      SWING_RADAR_DATABASE_URL: ${SWING_RADAR_DATABASE_URL:-postgres://postgres:postgres@postgres:5432/swing_radar}
      SWING_RADAR_DATABASE_SSL: ${SWING_RADAR_DATABASE_SSL:-false}
      SWING_RADAR_DB_POOL_MAX: ${SWING_RADAR_DB_POOL_MAX:-10}
      SWING_RADAR_ADMIN_TOKEN: ${SWING_RADAR_ADMIN_TOKEN:-replace-with-long-random-secret}
      SWING_RADAR_STALE_WARNING_MINUTES: ${SWING_RADAR_STALE_WARNING_MINUTES:-180}
      SWING_RADAR_STALE_CRITICAL_MINUTES: ${SWING_RADAR_STALE_CRITICAL_MINUTES:-360}
      SWING_RADAR_NAVER_CLIENT_ID: ${SWING_RADAR_NAVER_CLIENT_ID:-}
      SWING_RADAR_NAVER_CLIENT_SECRET: ${SWING_RADAR_NAVER_CLIENT_SECRET:-}
      SWING_RADAR_DART_API_KEY: ${SWING_RADAR_DART_API_KEY:-}
      SWING_RADAR_NEWS_API_KEY: ${SWING_RADAR_NEWS_API_KEY:-}
      SWING_RADAR_KRX_DOWNLOADS_DIR: ${SWING_RADAR_KRX_DOWNLOADS_DIR:-/app/data/imports}
      SWING_RADAR_KRX_DOWNLOAD_PATTERN: ${SWING_RADAR_KRX_DOWNLOAD_PATTERN:-KRX}
      SWING_RADAR_DAILY_CYCLE_REPORT_PATH: ${SWING_RADAR_DAILY_CYCLE_REPORT_PATH:-/app/data/ops/latest-daily-cycle.json}
      SWING_RADAR_AUTO_HEAL_REPORT_PATH: ${SWING_RADAR_AUTO_HEAL_REPORT_PATH:-/app/data/ops/latest-auto-heal.json}
    ports:
      - "${SWING_RADAR_APP_PORT:-3000}:3000"
    volumes:
      - ./data:/app/data
      - ./backups:/backups
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/health').then((response)=>process.exit(response.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  swing-radar-postgres:
